<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>高中化學晶體綜合比較問答遊戲</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>高中化學晶體綜合比較問答遊戲</h1>
    </header>

    <main>
      <section id="start-screen" class="screen">
        <h2>開始</h2>
        <div class="mode-select">
          <label><input type="radio" name="mode" value="single" checked> 單人</label>
          <label><input type="radio" name="mode" value="duo"> 雙人</label>
        </div>
        <div class="names">
          <label>玩家一名稱： <input id="player1" placeholder="玩家1"/></label>
          <label id="player2-label">玩家二名稱： <input id="player2" placeholder="玩家2" disabled/></label>
        </div>
        <div class="count-select">
          <label>題數：
            <select id="qcount">
              <option value="5">5</option>
              <option value="10" selected>10</option>
              <option value="15">15</option>
              <option value="20">20</option>
            </select>
          </label>
        </div>
        <button id="start-btn">開始遊戲</button>
      </section>

      <section id="game-screen" class="screen hidden">
        <div class="game-header">
          <div id="player-indicator"></div>
          <div id="score-display">分數: 0</div>
        </div>
        <div id="question-meta">題號: <span id="q-index">0</span>/<span id="q-total">0</span></div>
        <div id="timer">
          <div id="time-bar"></div>
          <div id="time-text">15s</div>
        </div>
        <div id="question-area">
          <div id="q-text"></div>
          <div id="choices"></div>
        </div>
        <div id="feedback" class="hidden"></div>
        <div class="controls">
          <button id="next-btn" class="hidden">下一題</button>
        </div>
      </section>

      <section id="result-screen" class="screen hidden">
        <h2>遊戲結果</h2>
        <div id="summary"></div>
        <div id="records"></div>
        <button id="restart-btn">回到開始</button>
      </section>
    </main>
    <footer>
      <small>題庫範圍：離子晶體 / 原子晶體 / 分子晶體 / 金屬晶體（含石墨、SiO₂）</small>
    </footer>
  </div>
  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
